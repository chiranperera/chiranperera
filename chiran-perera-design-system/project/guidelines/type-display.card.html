<!-- @dsCard group="Type" viewport="700x320" name="Display scale" subtitle="Stolzl 700, tight tracking — oversized & layered" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:28px; color:var(--ink); }
  .item { display:flex; align-items:baseline; gap:16px; padding:10px 0; border-bottom:1px solid var(--line); }
  .item:last-child { border:0; }
  .d { font-family:var(--font-display); font-weight:900; letter-spacing:-.035em; line-height:.9; }
  .tag { margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--ink-4); white-space:nowrap; }
</style>
</head>
<body>
  <div class="item"><span class="d" style="font-size:72px;letter-spacing:-.045em">2025</span><span class="tag">mega · clamp→280</span></div>
  <div class="item"><span class="d" style="font-size:52px">Found.</span><span class="tag">display · clamp→160</span></div>
  <div class="item"><span class="d" style="font-size:36px">Nothing to see</span><span class="tag">D1 · clamp→104</span></div>
  <div class="item"><span class="d" style="font-size:24px;font-weight:800">Research &amp; discovery</span><span class="tag">D2 · clamp→64</span></div>
</body>
</html>
