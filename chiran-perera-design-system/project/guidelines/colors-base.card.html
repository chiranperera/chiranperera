<!-- @dsCard group="Colors" viewport="700x200" name="Canvas" subtitle="Near-black neutral surfaces — bg → bg-4" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:24px; }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .sw { border-radius:var(--r-xs); border:1px solid var(--line); overflow:hidden; }
  .chip { height:88px; }
  .meta { padding:10px 12px; background:var(--bg-3); }
  .name { font:var(--w-bold) 12px var(--font-display); color:var(--ink); letter-spacing:-.01em; }
  .val { font-family:var(--font-mono); font-size:11px; color:var(--ink-4); margin-top:3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><div class="name">--bg</div><div class="val">#0A0A0B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-2)"></div><div class="meta"><div class="name">--bg-2</div><div class="val">#0F0F11</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-3)"></div><div class="meta"><div class="name">--bg-3</div><div class="val">#161619</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-4)"></div><div class="meta"><div class="name">--bg-4</div><div class="val">#1E1E22</div></div></div>
  </div>
</body>
</html>
