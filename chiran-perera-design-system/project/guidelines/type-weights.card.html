<!-- @dsCard group="Type" viewport="700x210" name="Weights" subtitle="Stolzl — Thin 100 → Bold 700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:24px; color:var(--ink); }
  .row { display:flex; gap:8px; flex-direction:column; }
  .w { display:flex; align-items:baseline; gap:16px; }
  .w b { font-family:var(--font-display); font-size:28px; letter-spacing:-.02em; width:200px; }
  .w span { font-family:var(--font-mono); font-size:11px; color:var(--ink-4); }
</style>
</head>
<body>
  <div class="row">
    <div class="w"><b style="font-weight:100">Thin</b><span>100 · --w-thin</span></div>
    <div class="w"><b style="font-weight:300">Light</b><span>300 · --w-light</span></div>
    <div class="w"><b style="font-weight:400">Regular</b><span>400 · --w-regular · body</span></div>
    <div class="w"><b style="font-weight:500">Medium</b><span>500 · --w-medium · lead, eyebrows</span></div>
    <div class="w"><b style="font-weight:700">Bold</b><span>700 · --w-bold · all display</span></div>
  </div>
</body>
</html>
