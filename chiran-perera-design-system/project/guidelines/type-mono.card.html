<!-- @dsCard group="Type" viewport="700x220" name="Mono & labels" subtitle="Space Mono — eyebrows, metadata, pagination" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:28px; }
  .label { font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); }
  .row { display:flex; gap:18px; margin-top:18px; flex-wrap:wrap; align-items:center; }
  .meta { font-family:var(--font-mono); font-size:12px; color:var(--ink-3); }
  .pag { font-family:var(--font-display); font-weight:800; font-size:40px; letter-spacing:-.02em; color:var(--ink); margin-top:16px; display:flex; align-items:baseline; gap:6px; }
  .pag small { font-family:var(--font-mono); font-size:13px; font-weight:400; color:var(--ink-4); }
  .chip { font-family:var(--font-mono); font-size:11px; color:var(--ink-2); border:1px solid var(--line); padding:5px 10px; border-radius:var(--r-pill); }
</style>
</head>
<body>
  <div class="label">Branding · Web · AI — 2026</div>
  <div class="row">
    <span class="meta">ROLE / Design + Build</span>
    <span class="meta">1M / 3FT</span>
    <span class="chip">Next.js</span>
    <span class="chip">WebGL</span>
  </div>
  <div class="pag">01<small>&nbsp;/ 05</small></div>
</body>
</html>
