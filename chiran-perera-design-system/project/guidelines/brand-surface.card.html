<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; }
  .stage { position:relative; height:300px; overflow:hidden; background:var(--bg); }
  .stage::after { content:''; position:absolute; inset:0; pointer-events:none;
    background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:var(--grid-size) var(--grid-size);
    mask-image:radial-gradient(800px 460px at 50% -10%, #000 5%, transparent 88%);
    -webkit-mask-image:radial-gradient(800px 460px at 50% -10%, #000 5%, transparent 88%); }
  .light { position:absolute; top:-160px; left:50%; transform:translateX(-50%); width:600px; height:300px;
    background:radial-gradient(circle, rgba(255,255,255,.10), transparent 60%); pointer-events:none; }
  .big { position:absolute; inset:0; display:grid; place-items:center; }
  .big span { font-family:var(--font-display); font-weight:900; font-size:120px; letter-spacing:-.05em; color:var(--ink); opacity:.9; }
  .cap { position:absolute; left:28px; bottom:22px; font-family:var(--font-mono); font-size:11px; color:var(--ink-3); letter-spacing:.06em; text-transform:uppercase; }
</style>
</head>
<body>
  <div class="stage">
    <div class="light"></div>
    <div class="big"><span>STUDIO</span></div>
    <div class="cap">grid · 80px cell · white / .035 · radial top light</div>
  </div>
</body>
</html>
