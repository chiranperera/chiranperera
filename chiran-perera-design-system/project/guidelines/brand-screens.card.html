<!-- @dsCard group="Brand" viewport="700x300" name="Screen patterns" subtitle="home · work list · project detail · about · contact · empty" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:22px; color:var(--ink); }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .scr { border:1px solid var(--line); border-radius:var(--r-xs); aspect-ratio:16/10; background:var(--bg-2); position:relative; overflow:hidden; padding:10px; }
  .scr .top { display:flex; justify-content:space-between; align-items:center; }
  .scr .mk { width:18px; height:5px; background:var(--ink); border-radius:1px; }
  .scr .mn { display:flex; gap:3px; }
  .scr .mn i { width:8px; height:3px; background:var(--ink-4); border-radius:1px; }
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-4); margin-top:9px; }
  /* home: big word + portrait band */
  .home .word { position:absolute; left:0; right:0; top:42%; transform:translateY(-50%); text-align:center; font-family:var(--font-display); font-weight:700; font-size:34px; letter-spacing:-.04em; color:var(--ink-3); }
  .home .fig { position:absolute; left:50%; top:18%; transform:translateX(-50%); width:34%; height:74%; background:repeating-linear-gradient(135deg, rgba(255,255,255,.06) 0 2px, transparent 2px 7px), var(--bg-4); border-radius:2px; }
  .home .pg { position:absolute; right:9px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:3px; }
  .home .pg i { width:10px; height:2px; background:var(--ink-4); }
  .home .pg i:first-child { width:16px; background:var(--accent); }
  /* list */
  .list .rows { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:12px; }
  .list .rows i { aspect-ratio:4/3; background:var(--bg-4); border-radius:2px; }
  /* detail */
  .detail .hero { height:46%; background:repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 2px, transparent 2px 8px), var(--bg-4); border-radius:2px; margin-top:8px; }
  .detail .t { height:9px; width:60%; background:var(--ink); border-radius:1px; margin-top:8px; }
  .detail .ln { height:4px; background:var(--line-2); border-radius:1px; margin-top:6px; }
  .detail .ln.s { width:80%; }
  /* about */
  .about .big { font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:-.03em; margin-top:14px; line-height:1; }
  .about .ln { height:4px; background:var(--line-2); border-radius:1px; margin-top:7px; }
  .about .ln.s { width:70%; }
  /* contact */
  .contact .big { font-family:var(--font-display); font-weight:700; font-size:18px; letter-spacing:-.03em; margin-top:12px; }
  .contact .em { font-family:var(--font-mono); font-size:9px; color:var(--accent); margin-top:6px; }
  .contact .fld { height:14px; border:1px solid var(--line-2); border-radius:2px; margin-top:7px; }
  /* empty */
  .empty { display:grid; place-items:center; }
  .empty .ic { width:26px; height:26px; border:1.5px solid var(--line-2); border-radius:50%; display:grid; place-items:center; color:var(--ink-4); }
  .empty .msg { font-family:var(--font-mono); font-size:9px; color:var(--ink-4); margin-top:8px; }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <div class="scr home"><div class="top"><span class="mk"></span><span class="mn"><i></i><i></i></span></div><div class="word">PORTFOLIO</div><div class="fig"></div><div class="pg"><i></i><i></i><i></i><i></i></div></div>
      <div class="lbl">Home — slideshow</div>
    </div>
    <div>
      <div class="scr list"><div class="top"><span class="mk"></span><span class="mn"><i></i><i></i></span></div><div class="rows"><i></i><i></i><i></i><i></i></div></div>
      <div class="lbl">Work — index</div>
    </div>
    <div>
      <div class="scr detail"><div class="top"><span class="mk"></span><span class="mn"><i></i></span></div><div class="hero"></div><div class="t"></div><div class="ln"></div><div class="ln s"></div></div>
      <div class="lbl">Project — detail</div>
    </div>
    <div>
      <div class="scr about"><div class="top"><span class="mk"></span><span class="mn"><i></i><i></i></span></div><div class="big">About.</div><div class="ln"></div><div class="ln s"></div><div class="ln"></div></div>
      <div class="lbl">About / Studio</div>
    </div>
    <div>
      <div class="scr contact"><div class="top"><span class="mk"></span><span class="mn"><i></i></span></div><div class="big">Let's talk.</div><div class="em">hello@chiranperera.com</div><div class="fld"></div><div class="fld"></div></div>
      <div class="lbl">Contact</div>
    </div>
    <div>
      <div class="scr empty"><div class="ic">?</div><div class="msg">Nothing here yet</div></div>
      <div class="lbl">Empty / 404</div>
    </div>
  </div>
</body>
</html>
