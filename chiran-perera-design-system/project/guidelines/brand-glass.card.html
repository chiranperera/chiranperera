<!-- @dsCard group="Brand" viewport="700x300" name="Type meets image" subtitle="The signature move — oversized grotesque layered with B&W media" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; }
  .stage { position:relative; height:300px; overflow:hidden; background:var(--bg); }
  .img { position:absolute; inset:0; background:url('../assets/hero-poster.jpg') center/cover no-repeat; filter:grayscale(1) contrast(1.05) brightness(.7); }
  .scrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,10,11,.2), rgba(10,10,11,.75)); }
  .title { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:900; font-size:118px; letter-spacing:-.05em; color:var(--ink);
    mix-blend-mode:overlay; }
  .chrome { position:absolute; inset:0; padding:22px 28px; display:flex; flex-direction:column; justify-content:space-between; }
  .top { display:flex; justify-content:space-between; align-items:center; }
  .eyebrow { font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-2); }
  .num { font-family:var(--font-display); font-weight:900; font-size:40px; letter-spacing:-.02em; color:var(--ink); }
  .num small { font-family:var(--font-mono); font-size:13px; font-weight:400; color:var(--ink-3); }
  .ttl { font-family:var(--font-display); font-weight:900; font-size:34px; letter-spacing:-.03em; color:var(--ink); }
</style>
</head>
<body>
  <div class="stage">
    <div class="img"></div>
    <div class="scrim"></div>
    <div class="title">STUDIO</div>
    <div class="chrome">
      <div class="top"><span class="eyebrow">Branding · Web · AI — 2026</span><span class="num">01<small>&nbsp;/05</small></span></div>
      <div class="ttl">Sarisara Lanka<span style="color:var(--accent)">.</span></div>
    </div>
  </div>
</body>
</html>
