<!-- @dsCard group="Components" viewport="700x280" name="Progress" subtitle="linear · segmented · rings · skeletons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:28px; color:var(--ink); }
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-4); margin:0 0 12px; }
  .grid { display:grid; grid-template-columns:1.3fr 1fr; gap:34px 40px; align-items:start; }
  .bar { height:4px; background:var(--bg-4); border-radius:var(--r-pill); overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--ink); border-radius:var(--r-pill); }
  .bar.accent > i { background:var(--accent); }
  .seg { display:flex; gap:6px; }
  .seg > i { flex:1; height:4px; border-radius:var(--r-pill); background:var(--bg-4); }
  .seg > i.on { background:var(--ink); }
  .rings { display:flex; gap:22px; align-items:center; }
  .ring { width:64px; height:64px; border-radius:50%; display:grid; place-items:center; font-family:var(--font-mono); font-size:13px; color:var(--ink); }
  .sk { display:flex; flex-direction:column; gap:9px; }
  .sk > i { height:10px; border-radius:var(--r-xs); background:linear-gradient(90deg,var(--bg-3),var(--bg-4),var(--bg-3)); background-size:200% 100%; animation:sh 1.4s linear infinite; }
  @keyframes sh { to { background-position:-200% 0; } }
  .stk { margin-top:24px; }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <p class="lbl">Linear — 68%</p>
      <div class="bar"><i style="width:68%"></i></div>
      <p class="lbl" style="margin-top:20px">Accent — 40%</p>
      <div class="bar accent"><i style="width:40%"></i></div>
      <p class="lbl" style="margin-top:20px">Segmented — step 3 / 5</p>
      <div class="seg"><i class="on"></i><i class="on"></i><i class="on"></i><i></i><i></i></div>
      <div class="sk stk">
        <p class="lbl">Skeleton</p>
        <i style="width:80%"></i><i style="width:60%"></i><i style="width:70%"></i>
      </div>
    </div>
    <div>
      <p class="lbl">Rings</p>
      <div class="rings">
        <div class="ring" style="background:conic-gradient(var(--ink) 75%, var(--bg-4) 0)"><span style="width:50px;height:50px;border-radius:50%;background:var(--bg);display:grid;place-items:center">75%</span></div>
        <div class="ring" style="background:conic-gradient(var(--accent) 40%, var(--bg-4) 0)"><span style="width:50px;height:50px;border-radius:50%;background:var(--bg);display:grid;place-items:center">40%</span></div>
      </div>
    </div>
  </div>
</body>
</html>
