<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:22px; }
  .grid { display:grid; grid-template-columns:repeat(9,1fr); gap:4px; }
  .cell { aspect-ratio:1; border:1px solid var(--line); border-radius:var(--r-xs); display:grid; place-items:center; color:var(--ink-2); }
  .cell:hover { border-color:var(--line-3); color:var(--ink); }
  svg { width:20px; height:20px; }
  .cap { font-family:var(--font-mono); font-size:10px; color:var(--ink-4); margin-top:14px; letter-spacing:.04em; text-transform:uppercase; }
</style>
</head>
