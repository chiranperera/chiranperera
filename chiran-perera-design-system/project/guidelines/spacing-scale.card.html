<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base rhythm — generous blackspace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--bg); font-family:var(--font-body); padding:24px; }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--ink); width:22px; }
  .lbl { font-family:var(--font-mono); font-size:10px; color:var(--ink-4); }
  .v { font:var(--w-bold) 11px var(--font-display); color:var(--ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="v">1</div><div class="lbl">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="v">2</div><div class="lbl">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="v">3</div><div class="lbl">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="v">4</div><div class="lbl">16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="v">6</div><div class="lbl">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="v">8</div><div class="lbl">32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="v">12</div><div class="lbl">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="v">16</div><div class="lbl">64</div></div>
  </div>
</body>
</html>
