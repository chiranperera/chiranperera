<!-- @startingPoint section="Studio Site" subtitle="Fullscreen monochrome project slideshow + full case-study pages" viewport="1440x880" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chiran Perera — Studio</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="site.css" />
<link rel="stylesheet" href="sections.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Chrome2.jsx"></script>
<script type="text/babel" src="Slideshow.jsx"></script>
<script type="text/babel" src="CaseStudy.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
  function SimplePage({ title, sub, go }) {
    return (
      <div className="case" style={{ minHeight: "100vh" }}>
        <div className="case-back">
          <button className="tlink" onClick={() => go("home")}><IArrowL s={16} /> Back</button>
          <a className="wordmark" onClick={() => go("home")} style={{ fontSize: 16 }}>CHIRAN<span className="dot" style={{ color: "var(--accent)" }}>.</span></a>
        </div>
        <section className="wrap" style={{ paddingTop: "26vh" }}>
          <span className="eyebrow"><span className="dot" style={{ color: "var(--accent)" }}>●</span> {title}</span>
          <h1 className="cp-display" style={{ fontSize: "var(--fs-display)", lineHeight: .9, margin: "22px 0 24px" }}>{title}.</h1>
          <p style={{ fontSize: 20, lineHeight: 1.5, color: "var(--ink-2)", maxWidth: 640 }}>{sub}</p>
          <div style={{ marginTop: 36 }}><button className="btn btn-outline" onClick={() => go("home")}>Back to work <span className="arr">→</span></button></div>
        </section>
        <Footer go={go} />
      </div>
    );
  }

  function App() {
    const [route, setRoute] = React.useState("home");
    const [menu, setMenu] = React.useState(false);
    const [wipe, setWipe] = React.useState(false);
    const go = React.useCallback((r) => {
      setMenu(false);
      const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduce) { setRoute(r); window.scrollTo(0, 0); return; }
      setWipe(true);
      setTimeout(() => { setRoute(r); window.scrollTo(0, 0); }, 420);
      setTimeout(() => setWipe(false), 900);
    }, []);

    // home slideshow is fixed/fullscreen → lock body scroll; inner pages scroll.
    React.useEffect(() => {
      document.body.style.overflow = route === "home" ? "hidden" : "auto";
    }, [route]);

    let page;
    if (route === "home") page = <Slideshow onOpen={(slug) => go("case:" + slug)} />;
    else if (route.startsWith("case:")) page = <CaseStudy slug={route.slice(5)} go={go} />;
    else if (route === "work") page = <WorkPage go={go} onMenu={() => setMenu(true)} />;
    else if (route === "studio") page = <StudioPage go={go} onMenu={() => setMenu(true)} />;
    else if (route === "services") page = <ServicesPage go={go} onMenu={() => setMenu(true)} />;
    else if (route === "contact") page = <ContactPage go={go} onMenu={() => setMenu(true)} />;
    else if (route === "journal") page = <SimplePage go={go} title="Journal" sub="Notes on AI search, brand systems, and building cinematic, citable websites for lifestyle brands. Coming soon." />;
    else page = <Slideshow onOpen={(slug) => go("case:" + slug)} />;

    return (
      <>
        <Preloader />
        <Cursor />
        <Field />
        {route === "home" && <Nav onMenu={() => setMenu(true)} onHome={() => go("home")} />}
        {page}
        <Overlay open={menu} onClose={() => setMenu(false)} go={go} />
        {wipe && <div className="wipe run"><span className="mk">CHIRAN<span className="dot">.</span></span></div>}
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
